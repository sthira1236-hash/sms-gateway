<!DOCTYPE html>

<html>

<head>

<title>SMS Gateway Dashboard</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:8px;
max-width:900px;
margin:auto;
}

input, textarea{
width:100%;
padding:8px;
margin-top:5px;
margin-bottom:15px;
}

button{
padding:10px 20px;
background:#007bff;
color:white;
border:none;
cursor:pointer;
margin-right:10px;
}

button:hover{
background:#0056b3;
}

table{
width:100%;
border-collapse: collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:left;
}

th{
background:#eee;
}

.stats{
margin-bottom:20px;
font-size:18px;
}

</style>

</head>

<body>

<div class="container">

<h1>SMS Gateway Dashboard</h1>

<div class="stats">
<b>Pending:</b> <span id="pendingCount">0</span> |
<b>Sent:</b> <span id="sentCount">0</span> |
<b>Failed:</b> <span id="failedCount">0</span>
</div>

<hr>

<h2>Send SMS</h2>

<form action="/send-sms" method="POST">

Number<br> <input name="number" required>

Message<br> <input name="message" required>

<button type="submit">Send SMS</button>

</form>

<hr>

<h2>Bulk SMS</h2>

<form action="/send-bulk" method="POST">

Numbers (one per line)<br>

<textarea name="numbers" rows="6" required></textarea>

Message<br> <input name="message" required>

<button type="submit">Send Bulk SMS</button>

</form>

<hr>

<h2>SMS Logs</h2>

<button onclick="clearQueue()">Clear SMS Queue</button>

<table id="smsTable">

<thead>
<tr>
<th>Number</th>
<th>Message</th>
<th>Status</th>
<th>Time</th>
</tr>
</thead>

<tbody>
</tbody>

</table>

</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>

/* FIREBASE CONFIG */

var firebaseConfig = {
databaseURL: "https://sms-gateway-ccf82-default-rtdb.asia-southeast1.firebasedatabase.app"
};

firebase.initializeApp(firebaseConfig);

var db = firebase.database().ref("sms_queue");

db.on("value", function(snapshot){

let table = document.querySelector("#smsTable tbody");
table.innerHTML = "";

let pending = 0;
let sent = 0;
let failed = 0;

snapshot.forEach(function(child){

let sms = child.val();

if(sms.status === "pending") pending++;
if(sms.status === "sent") sent++;
if(sms.status === "failed") failed++;

let row = `
<tr>
<td>${sms.number}</td>
<td>${sms.message}</td>
<td>${sms.status}</td>
<td>${new Date(sms.time).toLocaleString()}</td>
</tr>
`;

table.innerHTML += row;

});

document.getElementById("pendingCount").innerText = pending;
document.getElementById("sentCount").innerText = sent;
document.getElementById("failedCount").innerText = failed;

});

/* CLEAR QUEUE */

function clearQueue(){

fetch("/clear-queue", {
method:"POST"
})
.then(res => res.text())
.then(data => {

alert(data);

});

}

</script>

</body>
</html>
